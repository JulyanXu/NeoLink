<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">NeoLink webpage snapshot pipeline</title>
  <desc id="desc">A visual explanation of how NeoLink collects WeChat article snapshots, extracts clean HTML, deduplicates content and renders station-side article pages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f2f8ff"/>
      <stop offset=".56" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eaf8ef"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#257dff"/>
      <stop offset="1" stop-color="#25c69a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#24415f" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="36" fill="url(#bg)"/>
  <circle cx="1040" cy="70" r="120" fill="#dff1ff" opacity=".6"/>
  <circle cx="130" cy="560" r="150" fill="#dff8ea" opacity=".75"/>
  <text x="64" y="72" fill="#091b44" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Webpage Snapshot Capture</text>
  <text x="64" y="110" fill="#56708c" font-family="Inter, Arial, sans-serif" font-size="17">微信文章快照用于保留正文、图片与来源记录，正文在站内阅读，来源链接作为复核入口。</text>

  <g filter="url(#shadow)">
    <rect x="64" y="160" width="250" height="328" rx="24" fill="#ffffff" stroke="#dce7f4"/>
    <rect x="90" y="190" width="198" height="36" rx="10" fill="#edf5ff"/>
    <rect x="90" y="244" width="198" height="16" rx="8" fill="#bed7f6"/>
    <rect x="90" y="274" width="160" height="16" rx="8" fill="#d6e6f8"/>
    <rect x="90" y="318" width="198" height="126" rx="18" fill="#e6f5ee"/>
    <path d="M116 410c28-46 56-50 86-22 32 31 50 16 72-34" fill="none" stroke="#38b985" stroke-width="8" stroke-linecap="round"/>
    <text x="90" y="522" fill="#0c2457" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">01 快照源</text>
    <text x="90" y="552" fill="#5c7088" font-family="Inter, Arial, sans-serif" font-size="15">文章标题、发布时间、原文链接</text>
  </g>

  <path d="M338 322h92" stroke="url(#blue)" stroke-width="8" stroke-linecap="round"/>
  <path d="M414 302l28 20-28 20" fill="none" stroke="#25a8d8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="458" y="160" width="284" height="328" rx="24" fill="#ffffff" stroke="#dce7f4"/>
    <rect x="488" y="192" width="224" height="42" rx="12" fill="#eef4ff"/>
    <text x="512" y="220" fill="#257dff" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="700">&lt;article&gt;</text>
    <rect x="488" y="262" width="224" height="16" rx="8" fill="#cfe0f5"/>
    <rect x="488" y="292" width="176" height="16" rx="8" fill="#dce9f7"/>
    <rect x="488" y="336" width="102" height="88" rx="14" fill="#d9f4e7"/>
    <rect x="610" y="336" width="102" height="88" rx="14" fill="#e3efff"/>
    <text x="488" y="522" fill="#0c2457" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">02 净化 HTML</text>
    <text x="488" y="552" fill="#5c7088" font-family="Inter, Arial, sans-serif" font-size="15">去脚本、保留正文结构与图片</text>
  </g>

  <path d="M766 322h92" stroke="url(#blue)" stroke-width="8" stroke-linecap="round"/>
  <path d="M842 302l28 20-28 20" fill="none" stroke="#25a8d8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="884" y="160" width="252" height="328" rx="24" fill="#071f49"/>
    <rect x="914" y="194" width="192" height="20" rx="10" fill="#40cfa1"/>
    <rect x="914" y="236" width="162" height="14" rx="7" fill="#74a8ff"/>
    <rect x="914" y="266" width="192" height="14" rx="7" fill="#244d8b"/>
    <rect x="914" y="296" width="138" height="14" rx="7" fill="#244d8b"/>
    <rect x="914" y="350" width="192" height="78" rx="18" fill="#12396e"/>
    <path d="M936 406c34-42 62-10 84-34 24-26 44-22 66 4" fill="none" stroke="#40cfa1" stroke-width="7" stroke-linecap="round"/>
    <text x="914" y="522" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">03 站内详情页</text>
    <text x="914" y="552" fill="#b8c8df" font-family="Inter, Arial, sans-serif" font-size="15">正文内联渲染，来源可追溯</text>
  </g>
</svg>
